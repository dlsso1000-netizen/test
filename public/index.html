<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎬 종합사용툴 - YouTube 분석 대시보드</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: #333;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
    header {
      background: rgba(255,255,255,0.95);
      padding: 30px;
      border-radius: 16px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    h1 { font-size: 2.2em; margin-bottom: 10px; }
    .subtitle { color: #666; font-size: 1em; }
    .status-bar {
      display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap;
    }
    .badge {
      padding: 6px 14px; border-radius: 20px; font-size: 0.85em; font-weight: 600;
    }
    .badge.ok { background: #d4edda; color: #155724; }
    .badge.warn { background: #fff3cd; color: #856404; }
    .badge.err { background: #f8d7da; color: #721c24; }

    .controls {
      background: rgba(255,255,255,0.95);
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }
    .controls select, .controls button, .controls input {
      padding: 10px 16px; border: 2px solid #e0e0e0; border-radius: 8px;
      font-size: 1em; background: white; cursor: pointer;
    }
    .controls button {
      background: #667eea; color: white; border-color: #667eea; font-weight: 600;
    }
    .controls button:hover { background: #5568d3; }
    .controls input { flex: 1; min-width: 200px; cursor: text; }

    .videos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }
    .video-card {
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
    }
    .video-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
    }
    .video-card img { width: 100%; height: 180px; object-fit: cover; }
    .video-info { padding: 15px; }
    .rank-badge {
      display: inline-block;
      background: #667eea; color: white;
      padding: 4px 10px; border-radius: 20px;
      font-size: 0.85em; font-weight: 700;
      margin-bottom: 8px;
    }
    .video-title {
      font-size: 1.05em; font-weight: 600; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 8px; min-height: 2.8em;
    }
    .video-channel { color: #888; font-size: 0.9em; margin-bottom: 10px; }
    .video-stats {
      display: flex; gap: 12px; font-size: 0.85em; color: #666;
      border-top: 1px solid #eee; padding-top: 10px; flex-wrap: wrap;
    }
    .stat { display: flex; align-items: center; gap: 4px; }

    .loading, .empty, .error {
      text-align: center; padding: 60px 20px; color: white;
      background: rgba(255,255,255,0.1); border-radius: 12px;
    }
    .loading .spinner {
      display: inline-block; width: 40px; height: 40px;
      border: 4px solid rgba(255,255,255,0.3); border-top-color: white;
      border-radius: 50%; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .setup-guide {
      background: rgba(255,243,205,0.98); color: #856404;
      padding: 20px; border-radius: 12px; margin: 20px 0;
    }
    .setup-guide code {
      background: #333; color: #fff; padding: 3px 8px; border-radius: 4px;
      font-family: monospace; font-size: 0.9em;
    }
    footer { text-align: center; color: rgba(255,255,255,0.8); margin-top: 40px; padding: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎬 종합사용툴</h1>
      <p class="subtitle">YouTube Data API v3 기반 트렌드 분석 대시보드</p>
      <div class="status-bar" id="statusBar">
        <span class="badge warn">⏳ 상태 확인 중...</span>
      </div>
    </header>

    <div id="setupGuide" style="display: none;"></div>

    <div class="controls">
      <label>🌍 국가:</label>
      <select id="regionSelect">
        <option value="KR">🇰🇷 한국</option>
        <option value="JP">🇯🇵 일본</option>
        <option value="US">🇺🇸 미국</option>
        <option value="GB">🇬🇧 영국</option>
        <option value="DE">🇩🇪 독일</option>
        <option value="FR">🇫🇷 프랑스</option>
        <option value="BR">🇧🇷 브라질</option>
        <option value="IN">🇮🇳 인도</option>
      </select>
      <button id="loadBtn">📊 인기 영상 불러오기</button>
      <input type="text" id="searchInput" placeholder="🔎 영상 검색 (100 유닛 소모)" />
      <button id="searchBtn">검색</button>
    </div>

    <div id="content">
      <div class="loading" id="initialMsg">
        <p style="font-size: 1.2em; margin-bottom: 10px;">👆 국가를 선택하고 "인기 영상 불러오기"를 눌러주세요!</p>
        <p>YouTube에서 실시간 트렌드를 가져옵니다.</p>
      </div>
    </div>

    <footer>
      <p>🎬 종합사용툴 v1.0.0 · Made with YouTube Data API v3 + Gemini AI</p>
      <p style="margin-top: 5px;">© 2026 dlsso1000-netizen</p>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const content = $('content');

    // 숫자 한국어 포맷 (1234567 → 123만 4567)
    function formatKorean(num) {
      if (!num) return '0';
      if (num >= 100000000) return (num / 100000000).toFixed(1) + '억';
      if (num >= 10000) return (num / 10000).toFixed(1) + '만';
      if (num >= 1000) return (num / 1000).toFixed(1) + '천';
      return num.toLocaleString();
    }

    // 상태 확인
    async function checkStatus() {
      try {
        const res = await fetch('/api/health');
        const data = await res.json();
        const sb = $('statusBar');
        sb.innerHTML = `
          <span class="badge ${data.youtubeApiReady ? 'ok' : 'err'}">
            🎬 YouTube API: ${data.youtubeApiReady ? '✅ 연결됨' : '❌ 미설정'}
          </span>
          <span class="badge ${data.geminiApiReady ? 'ok' : 'warn'}">
            🤖 Gemini AI: ${data.geminiApiReady ? '✅ 연결됨' : '⚠️ 선택사항'}
          </span>
          <span class="badge ok">v${data.version}</span>
        `;

        if (!data.youtubeApiReady) {
          $('setupGuide').style.display = 'block';
          $('setupGuide').className = 'setup-guide';
          $('setupGuide').innerHTML = `
            <h3>⚠️ YouTube API 키 설정이 필요합니다</h3>
            <p style="margin-top:10px;">1. 프로젝트 루트에 <code>.env</code> 파일을 만드세요</p>
            <p>2. 다음 내용을 입력하세요:</p>
            <pre style="background:#333;color:#fff;padding:10px;border-radius:6px;margin:10px 0;">YOUTUBE_API_KEY=발급받은_키_값</pre>
            <p>3. 서버 재시작: <code>npm start</code></p>
          `;
        }
      } catch (e) {
        $('statusBar').innerHTML = '<span class="badge err">❌ 서버 연결 실패</span>';
      }
    }

    // 인기 영상 로드
    async function loadTrending() {
      const region = $('regionSelect').value;
      content.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:15px;">로딩 중...</p></div>';

      try {
        const res = await fetch(`/api/trending?region=${region}&maxResults=50`);
        const data = await res.json();

        if (data.error) {
          content.innerHTML = `<div class="error"><h3>❌ 오류</h3><p>${data.error}</p></div>`;
          return;
        }

        renderVideos(data.videos, region);
      } catch (e) {
        content.innerHTML = `<div class="error">❌ ${e.message}</div>`;
      }
    }

    // 검색
    async function searchVideos() {
      const q = $('searchInput').value.trim();
      if (!q) return alert('검색어를 입력하세요!');

      content.innerHTML = '<div class="loading"><div class="spinner"></div><p style="margin-top:15px;">검색 중...</p></div>';

      try {
        const res = await fetch(`/api/search?q=${encodeURIComponent(q)}&maxResults=20`);
        const data = await res.json();

        if (data.error) {
          content.innerHTML = `<div class="error"><h3>❌ 오류</h3><p>${data.error}</p></div>`;
          return;
        }

        const videos = data.results.map((v, i) => ({
          ...v, id: v.videoId, viewCount: 0, rank: i + 1,
        }));
        renderVideos(videos, `검색: "${q}"`);
      } catch (e) {
        content.innerHTML = `<div class="error">❌ ${e.message}</div>`;
      }
    }

    // 영상 렌더링
    function renderVideos(videos, label) {
      if (!videos || videos.length === 0) {
        content.innerHTML = '<div class="empty">결과가 없습니다.</div>';
        return;
      }

      const html = `
        <h2 style="color:white;margin:20px 0;">📊 ${label} · ${videos.length}개</h2>
        <div class="videos-grid">
          ${videos.map((v, i) => `
            <div class="video-card" onclick="window.open('${v.url}', '_blank')">
              <img src="${v.thumbnail || ''}" alt="" onerror="this.style.display='none'">
              <div class="video-info">
                <span class="rank-badge">#${i + 1}</span>
                <div class="video-title">${v.title}</div>
                <div class="video-channel">${v.channelTitle || ''}</div>
                <div class="video-stats">
                  ${v.viewCount ? `<span class="stat">👁 ${formatKorean(v.viewCount)}</span>` : ''}
                  ${v.likeCount ? `<span class="stat">👍 ${formatKorean(v.likeCount)}</span>` : ''}
                  ${v.commentCount ? `<span class="stat">💬 ${formatKorean(v.commentCount)}</span>` : ''}
                </div>
              </div>
            </div>
          `).join('')}
        </div>
      `;
      content.innerHTML = html;
    }

    // 이벤트 등록
    $('loadBtn').addEventListener('click', loadTrending);
    $('searchBtn').addEventListener('click', searchVideos);
    $('searchInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchVideos();
    });

    // 초기화
    checkStatus();
  </script>
</body>
</html>
