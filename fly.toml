# Fly.io 배포 예시 (참고용)
# fly launch → fly secrets set YOUTUBE_API_KEY=... GEMINI_API_KEY=... → fly deploy
app = "jonghap-tool"
primary_region = "nrt"

[build]

[env]
  NODE_ENV = "production"
  PORT = "3000"
  DEFAULT_REGION = "KR"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/api/health"
    protocol = "http"
    timeout = "5s"

[[mounts]]
  source = "jonghap_data"
  destination = "/app/data"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
