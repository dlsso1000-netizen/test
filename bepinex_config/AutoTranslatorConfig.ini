;; ============================================================
;; XUnity.AutoTranslator 설정 파일 (Gemini 번역 서버용)
;; 이 파일을 게임폴더/BepInEx/config/ 에 복사하세요.
;; ============================================================

[Service]
;; CustomEndpoint를 사용하여 로컬 Gemini 번역 서버와 연동
Endpoint=CustomEndpoint

[Custom]
;; Gemini 번역 서버 URL (gemini_trans.py 실행 시 주소)
Url=http://127.0.0.1:5000/translate

[General]
;; 원본 언어
FromLanguage=zh
;; 번역 대상 언어
ToLanguage=ko

[Behaviour]
;; 번역 지연 (초) - 서버 부하 방지
Delay=0
;; 최대 동시 번역 수
MaxTranslationsBeforeSlowdown=50
;; UI 크래시 방지용 번역 큐 제한
MaxTranslationsQueuedPerEndpoint=100

[TextFrameworks]
;; UGUI 텍스트 번역 활성화
EnableUGUI=True
;; TextMeshPro 텍스트 번역 활성화
EnableTextMeshPro=True
;; NGUI 텍스트 번역 활성화
EnableNGUI=True
;; IMGui 비활성화 (보통 디버그용)
EnableIMGUI=False

[Files]
;; 번역 파일 출력 디렉토리
OutputFile=Translation/_AutoGeneratedTranslations.txt

[Texture]
;; 텍스처(이미지) 번역은 기본 비활성화
EnableTextureTranslation=False
EnableTextureDumping=False

[Font]
;; 한국어 폰트 오버라이드 (한글 깨짐 방지)
;; 폰트 파일을 게임 폴더에 넣고 아래 경로를 수정하세요.
;; 예: OverrideFont=NanumGothic
;; 시스템 폰트 이름 또는 게임 폴더 내 .ttf/.otf 경로
OverrideFont=
;; 폰트 크기 (0 = 기본값 사용)
OverrideFontSize=0
